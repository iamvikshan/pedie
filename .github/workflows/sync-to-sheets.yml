name: Sync DB → Google Sheets

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "additive"
        type: choice
        options:
          - additive
          - full

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Export listings to Google Sheets
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          SYNC_MODE: ${{ inputs.mode || 'additive' }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${SITE_URL}/api/sync/export?mode=${SYNC_MODE}" \
            -H "x-api-key: ${SYNC_API_KEY}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Sync failed with HTTP $http_code"
            exit 1
          fi
