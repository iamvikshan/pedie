name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "types/**"
      - "Dockerfile"
      - "package.json"
      - "tsconfig.json"
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-bun@main

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun test

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun (and node for some reason) and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          node --input-type=module -e "
            import semanticRelease from 'semantic-release';
            import { appendFileSync } from 'node:fs';
            try {
              const result = await semanticRelease();
              if (result && result.nextRelease && result.nextRelease.version) {
                appendFileSync(process.env.GITHUB_OUTPUT, 'new_release_published=true\n');
                console.log('Published release ' + result.nextRelease.version);
              } else {
                appendFileSync(process.env.GITHUB_OUTPUT, 'new_release_published=false\n');
                console.log('No new release published');
              }
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          "

  docker:
    name: Build & Push
    needs: release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

#      - name: Attest build provenance
#        uses: actions/attest-build-provenance@v3.2.0
#        with:
#          subject-name: ghcr.io/${{ github.repository }}
#          subject-digest: ${{ steps.push.outputs.digest }}
#          push-to-registry: true
